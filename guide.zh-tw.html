<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0b0d" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/favicon-180x180.png" />
  <title>寶石指南 | Aurex Gem House</title>
  <meta name="description" content="使用 Aurelia 寶石智能引擎，發現專屬於您的寶石推薦。基於您的出生星盤、星座和吠陀占星術。" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/aurelia.css" />
  <script defer src="assets/js/main.js"></script>
  <script defer src="assets/js/api-submit.js"></script>
  <script defer src="assets/js/aurelia-engine.js"></script>
  <link rel="alternate" hreflang="en" href="guide.html" />
  <link rel="alternate" hreflang="zh-CN" href="guide.zh-cn.html" />
  <link rel="alternate" hreflang="zh-TW" href="guide.zh-tw.html" />
  <link rel="alternate" hreflang="ja" href="guide.ja.html" />
  <link rel="alternate" hreflang="x-default" href="guide.html" />
</head>

<body>
  <header class="site-header" id="site-header" role="banner"></header>
<main id="main" tabindex="-1">
    <div id="aurelia-app">
      <!-- 懸浮寶石粒子 -->
      <div class="aurelia-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>

      <!-- 聊天容器 -->
      <div class="aurelia-container">
        <!-- 頭部 -->
        <div class="aurelia-header">
          <div class="aurelia-avatar">💎</div>
          <div class="aurelia-title">
            <h2>Aurelia</h2>
            <span>寶石智能引擎</span>
            <div class="aurelia-status">
              <span class="status-dot"></span>
              <span>線上</span>
            </div>
          </div>
        </div>

        <!-- 聊天訊息 -->
        <div class="aurelia-chat" id="aurelia-messages">
          <!-- 訊息由 aurelia-engine.js 動態渲染 -->
        </div>

        <!-- 輸入區域 -->
        <div class="aurelia-input" id="aurelia-input">
          <!-- 按鈕/表單由 aurelia-engine.js 動態渲染 -->
        </div>
      </div>
    </div>
  </main>
  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>
</body>

</html>
