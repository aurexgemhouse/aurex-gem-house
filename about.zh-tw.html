<body>
  <header class="site-header" id="site-header" role="banner"></header>
<main id="main" tabindex="-1">
    <section class='section' aria-labelledby='a1'>
      <h1 id='a1'>關於 Aurex Gem House</h1>
      <p>國際專業寶石學家，直接從斯里蘭卡和泰國甄選寶石。依特定需求精選，並配送至世界各地。</p>
      <ul>
        <li>斯里蘭卡與泰國產地直採</li>
        <li>透明披露產地與處理工藝</li>
        <li>可按需提供獨立實驗室鑑定</li>
        <li>訂製切工、成對寶石及校準批量供應</li>
      </ul>
    </section>
    <section class='section' aria-labelledby='c1'>
      <h2 id='c1'>聯絡我們</h2>
      <p>歡迎隨時諮詢，無任何義務。我們將在 24 小時內回覆。</p>
      <form class="contact-form" novalidate aria-describedby="contact-help">
        <p id="contact-help" class="sr">標有 * 的為必填項。</p>
        <div class="form-row"><label for="name">姓名 *</label><input id="name" name="name" type="text" required
            aria-required="true" /></div>
        <div class="form-row"><label for="email">電子郵件 *</label><input id="email" name="email" type="email"
            inputmode="email" required aria-required="true" /></div>
        <div class="form-row"><label for="phone">電話</label><input id="phone" name="phone" type="tel" inputmode="tel"
            placeholder="+886 ..." /></div>
        <div class="form-row"><label for="message">留言 *</label><textarea id="message" name="message" rows="6" required
            aria-required="true"></textarea></div>
        <div class="form-row"><label for="country">國家/地區</label><select id="country" name="country">
            <option>澳洲</option>
            <option>中國</option>
            <option>香港</option>
            <option>台灣</option>
            <option>日本</option>
            <option>其他</option>
          </select></div>
        <div class="form-row"><button type="submit" class="btn">發送諮詢</button></div>
        <p class="muted">點擊發送即表示您同意 Aurex Gem House 與您聯繫。本站不儲存任何資料；表單將開啟您的郵件用戶端。</p>
      </form>
    </section>
  </main>
  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>
</body>
