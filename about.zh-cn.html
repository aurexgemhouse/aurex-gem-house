<body>
  <header class="site-header" id="site-header" role="banner"></header>
<main id="main" tabindex="-1">
    <section class='section' aria-labelledby='a1'>
      <h1 id='a1'>关于 Aurex Gem House</h1>
      <p>国际专业宝石学家，直接从斯里兰卡和泰国甄选宝石。按特定要求精选，并配送至世界各地。</p>
      <ul>
        <li>斯里兰卡与泰国产地直采</li>
        <li>透明披露产地与处理工艺</li>
        <li>可按需提供独立实验室鉴定</li>
        <li>定制切工、成对宝石及校准批量供应</li>
      </ul>
    </section>
    <section class='section' aria-labelledby='c1'>
      <h2 id='c1'>联系我们</h2>
      <p>欢迎随时咨询，无任何义务。我们将在 24 小时内回复。</p>
      <form class="contact-form" novalidate aria-describedby="contact-help">
        <p id="contact-help" class="sr">标有 * 的为必填项。</p>
        <div class="form-row"><label for="name">姓名 *</label><input id="name" name="name" type="text" required
            aria-required="true" /></div>
        <div class="form-row"><label for="email">邮箱 *</label><input id="email" name="email" type="email"
            inputmode="email" required aria-required="true" /></div>
        <div class="form-row"><label for="phone">电话</label><input id="phone" name="phone" type="tel" inputmode="tel"
            placeholder="+86 ..." /></div>
        <div class="form-row"><label for="message">留言 *</label><textarea id="message" name="message" rows="6" required
            aria-required="true"></textarea></div>
        <div class="form-row"><label for="country">国家/地区</label><select id="country" name="country">
            <option>澳大利亚</option>
            <option>中国</option>
            <option>香港</option>
            <option>台湾</option>
            <option>日本</option>
            <option>其他</option>
          </select></div>
        <div class="form-row"><button type="submit" class="btn">发送咨询</button></div>
        <p class="muted">点击发送即表示您同意 Aurex Gem House 与您联系。本站不存储任何数据；表单将打开您的邮件客户端。</p>
      </form>
    </section>
  </main>
  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>
</body>
